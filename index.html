
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jadiel tv hd erro</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            position: relative;
        }
        .box {
            width: 80%; /* Ajuste a largura para centralizar melhor */
            max-width: 600px; /* Largura máxima para as caixas */
            padding: 20px;
            background: linear-gradient(to right, red, black);
            color: white;
            font-size: 2em;
            text-align: center;
            font-weight: bold;
            border: 2px solid red;
            box-shadow: 0 0 15px red;
            animation: glow 1.5s infinite alternate;
            margin: 20px auto; /* Centraliza as caixas */
        }

        @keyframes glow {
            from {
                box-shadow: 0 0 10px red;
            }
            to {
                box-shadow: 0 0 30px red, 0 0 60px red;
            }
        }

        .image-box {
            width: 80%; /* Ajuste a largura para centralizar melhor */
            max-width: 600px; /* Largura máxima para a caixa da imagem */
            padding: 20px;
            background: linear-gradient(to right, red, black);
            border: 2px solid red;
            box-shadow: 0 0 15px red;
            animation: glow 1.5s infinite alternate;
            position: fixed;
            top: 30%; /* Ajuste a posição da imagem */
            left: 50%;
            transform: translateX(-50%); /* Centraliza horizontalmente */
            z-index: 1000;
        }

        .image-box img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        h1 {
            margin-top: 60%;
            font-size: 3em;
        }

        p {
            font-size: 1.2em;
            margin: 20px;
        }

        /* Estilo do botão de suporte */
        .support-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: red;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px red;
            cursor: pointer;
            animation: glow 1.5s infinite alternate;
            z-index: 1000;
        }

        .support-button img {
            width: 30px; /* Ajuste o tamanho do ícone */
            height: 30px;
        }
    </style>
</head>
<body>

    <div class="box">JADIEL TV HD</div>

    <div class="box">ERROR🚫</div>

    <!-- Terceira caixa para a imagem com posição fixa -->
    <div class="image-box">
        <img src="erro.png" alt="Imagem">
    </div>

    
    <!-- Botão de suporte -->
    <a href="bot.html" class="support-button">
        <img src="bot.png" alt="Suporte">
    </a>

</body>
</html>
