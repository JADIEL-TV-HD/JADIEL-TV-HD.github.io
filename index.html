<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capturador de URLs m3u8</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Capturador de URLs m3u8</h1>
        <input type="text" id="urlInput" placeholder="Digite a URL do site" />
        <button id="captureButton">Capturar URLs m3u8</button>
        <div id="resultContainer" class="result-container">
            <h2>URLs Capturadas:</h2>
            <ul id="urlList"></ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
