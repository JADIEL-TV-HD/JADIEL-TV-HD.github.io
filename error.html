<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Erro</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: black;
            color: white;
            text-align: center;
        }

        .error-message {
            font-size: 24px;
            font-weight: bold;
            padding: 20px;
            background: linear-gradient(to right, red, black); /* Gradiente de vermelho para preto */
            border-radius: 5px;
        }

        .back-button {
            margin-top: 20px;
            background-color: green;
            color: white;
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="error-message">
        Acesso não autorizado! Você não pode acessar esta URL diretamente.
    </div>
    <button class="back-button" onclick="window.location.href='index.html';">Voltar para a Página Inicial</button>
</body>
</html>
