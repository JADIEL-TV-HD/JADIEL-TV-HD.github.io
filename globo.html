<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadiel TV HD</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: black;
            color: white;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            flex-direction: column;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .title-box, .text-box, .date-time-box, .extra-box {
            width: 80%;
            margin-top: 20px;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background: linear-gradient(to right, green, black);
            border-radius: 5px;
            box-shadow: 0 0 15px #00ff00, 0 0 30px #00ff00;
        }

        .video-box {
            margin-top: 20px;
            width: 80%;
            text-align: center;
            position: relative;
        }

        video {
            width: 100%;
            height: auto;
            border-radius: 5px;
        }

        .button-container {
            margin-top: 20px;
            text-align: center;
        }

        .back-button {
            background-color: green;
            color: white;
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
        }

        .quality-selector {
            margin-top: 20px;
            background-color: green;
            color: white;
            padding: 10px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
        }

        .date-time-box span {
            display: block;
            margin: 10px 0;
        }

    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        function updateDateTime() {
            const now = new Date();
            const date = now.toLocaleDateString('pt-BR');
            const time = now.toLocaleTimeString('pt-BR');
            document.getElementById('date-time').innerHTML = `<span>🗓️DATA: ${date}</span><span>⏰HORA: ${time}</span>`;
        }

        setInterval(updateDateTime, 1000);

        window.onload = function() {
            var video = document.getElementById('video');
            var videoSrc = "https://manifest.googlevideo.com/api/manifest/hls_playlist/expire/1728794928/ei/0PwKZ8PUA4iOobIPzMyZqAc/ip/190.89.74.219/id/69myRYgyvF4.1/itag/91/source/yt_live_broadcast/requiressl/yes/ratebypass/yes/live/1/sgoap/gir%3Dyes%3Bitag%3D139/sgovp/gir%3Dyes%3Bitag%3D160/rqh/1/hdlc/1/hls_chunk_host/rr2---sn-40npvouxaxjvh-nn5e.googlevideo.com/xpc/EgVo2aDSNQ%3D%3D/spc/54MbxX9yzgfYOH5f_t3Giuo1cc11r0jNfJL0XTg9P0bzIjyGMhF5TZ0HzkXU/vprv/1/playlist_type/LIVE/initcwndbps/717500/met/1728773346,/mh/N1/mm/44/mn/sn-40npvouxaxjvh-nn5e/ms/lva/mv/m/mvi/2/pcm2cms/yes/pl/24/rms/lva,lva/dover/11/pacing/0/keepalive/yes/fexp/51300760/mt/1728773068/sparams/expire,ei,ip,id,itag,source,requiressl,ratebypass,live,sgoap,sgovp,rqh,hdlc,xpc,spc,vprv,playlist_type/sig/AJfQdSswRQIhAL-T8zpJkr3x7phqo6HbMpTod5nFW0mZgaVi8ancRMxSAiBy-ndcfU9z3y3I8MRZZkxhlRZeuSIfkvnJX_nAZceMww%3D%3D/lsparams/hls_chunk_host,initcwndbps,met,mh,mm,mn,ms,mv,mvi,pcm2cms,pl,rms/lsig/ACJ0pHgwRAIgeSBmcsPj7BotoEsCJJXwz3FfPEU106ONK9CeV4wCpekCIFtIJ8YAIAd2nZOHrzjSyHrbTJKt6xHNInefMll616Tt/playlist/index.m3u8";
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                var availableQualities = hls.levels.map((level, index) => ({
                    level: index,
                    resolution: level.height + 'p',
                }));

                createQualitySelector(availableQualities, hls);
                video.play();
            });

            function createQualitySelector(qualities, hlsInstance) {
                var container = document.createElement('div');
                container.classList.add('quality-selector');
                container.innerHTML = 'Qualidade:';

                qualities.forEach(function(quality) {
                    var button = document.createElement('button');
                    button.innerText = quality.resolution;
                    button.style.margin = '0 5px';
                    button.style.padding = '10px';
                    button.style.backgroundColor = '#00ff00';
                    button.style.border = 'none';
                    button.style.cursor = 'pointer';

                    button.addEventListener('click', function() {
                        hlsInstance.currentLevel = quality.level;
                    });

                    container.appendChild(button);
                });

                document.body.appendChild(container);
            }
        };
    </script>
</head>
<body>
    <div class="title-box">
        JADIEL TV HD 
    </div>

    <div class="text-box">
        CANAL DA GLOBO
    </div>

    <div class="date-time-box" id="date-time">
        <!-- A data e hora serão atualizadas aqui -->
    </div>

    <!-- Tela de assistir TV -->
    <div class="video-box">
        <video id="video" controls autoplay></video>
    </div>

    <!-- Botão de voltar para página -->
    <div class="button-container">
        <button class="back-button" onclick="window.history.back();">♻️VOLTA♻️</button>
    </div>

    <!-- Nova caixa com texto abaixo do botão -->
    <div class="extra-box">
        Um canal de TV online que não exige antena nem sinal de TV tradicional, mas apenas uma conexão com a internet.
    </div>
</body>
</html>
